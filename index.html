<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify TALES - Brenner-park (Élesített verzió)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* --- JAVÍTOTT INTERNETES HÁTTÉRKÉP --- */
            background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1920'); /* Egy gyönyörű, valós erdei fotó az internetről */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.93);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            margin: 20px 0;
            backdrop-filter: blur(5px);
        }
        .tallér-számláló { background: #f1c40f; color: black; padding: 6px 16px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; font-size: 14px;}
        .audio-control { float: right; cursor: pointer; font-size: 22px; }
        
        .allomas-kep {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        h2 { color: #2c3e50; margin-top: 0; font-size: 22px; }
        .story-text { font-size: 16px; line-height: 1.6; color: #34495e; margin-bottom: 20px; }
        
        .option-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 14px 20px;
            margin: 8px 0;
            width: 100%;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            text-align: left;
            transition: transform 0.1s, background 0.2s;
        }
        .option-btn:hover { background-color: #2980b9; }
        .option-btn:active { transform: scale(0.98); }

        .feedback { padding: 15px; border-radius: 10px; margin-top: 15px; display: none; font-weight: bold; font-size: 15px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .next-btn { background-color: #2ecc71; color: white; display: none; margin-top: 20px; text-align: center; font-weight: bold; }
        .next-btn:hover { background-color: #27ae60; }
        
        .kupon { border: 3px dashed #e74c3c; padding: 20px; border-radius: 12px; background: #fdf2f2; text-align: center; margin-top: 20px;}
        .kupon h3 { color: #e74c3c; margin-top: 0; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="tallér-számláló">🪙 Aranytallérok: <span id="points">0</span></div>
    <span class="audio-control" onclick="zeneKapcsolo()" id="music-icon">🔇</span>
    
    <div id="game-content">
        </div>
</div>

<script>
// --- HANG EFFEKTEK ---
const hatterZene = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"); // Standard, jogtiszta háttérzene
hatterZene.loop = true;
hatterZene.volume = 0.15; // Kellemes, halk háttér

const penzCsorgas = new Audio("https://www.soundjay.com/buttons/sounds/button-09a.mp3"); // Egy tiszta, elektronikus "klikk-csilingelés" jó válasznál!
const hibaHang = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3"); // Egy egyértelmű "búb" hang rossz válasznál!

let zeneSzól = false;

function zeneKapcsolo() {
    if (!zeneSzól) {
        hatterZene.play().catch(e => console.log("Zene indítási hiba: " + e));
        zeneSzól = true;
        document.getElementById("music-icon").innerText = "🔊";
    } else {
        hatterZene.pause();
        zeneSzól = false;
        document.getElementById("music-icon").innerText = "🔇";
    }
}

// --- JÁTÉK ADATOK (INTERNETES KÉPEKKEL!) ---
const jatekAdatok = [
    {
        title: "1. Állomás: Indul a kaland!",
        kepUrl: "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=500", /* Egy valós buszmegálló/tábla kép a netről */
        story: "Sziasztok Kalandorok! Alfonz vagyok, a park őre. A medál első szilánkját a manók a park bejáratánál, a nagy információs tábla mögé rejtették. Mi a titkos kód a feloldáshoz? (Kattints a jó válaszra, vagy a jobb felső hangszóróra a zenéhez!)",
        options: [
            { text: "Büdi", isCorrect: true, feedback: "Ez az! A kód azonnal kattant, a medál első szilánkja a tiétek!" },
            { text: "Laki", isCorrect: false, feedback: "Avarvörös hiba! A zár meg sem moccan. Nézzétek meg jobban a táblát!" },
            { text: "Sápi", isCorrect: false, feedback: "Sajnos nem talált! A manók bűbája megzavart titeket. Próbáljátok újra!" }
        ]
    },
    {
        title: "2. Állomás: A Tündérforrás",
        kepUrl: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=500", /* Hegyi kövek/sziklák kép */
        story: "Sétáljatok oda a Tündérforráshoz! A monda szerint a manók a forrás csobogó kövei közé rejtették a következő darabot. Milyen formájú az a kőmedence, amiből a forrásvíz felbugyog?",
        options: [
            { text: "Tökéletes kör alakú", isCorrect: false, feedback: "Nem nyert! Lehet, hogy a manók bűbája elvakít, de nézzétek meg közelebbről!" },
            { text: "Természetes, szabálytalan szikla-forma", isCorrect: true, feedback: "Zseniális! A kövek között megcsillant a második szilánk is!" },
            { text: "Kocka alakú betonmedence", isCorrect: false, feedback: "A tündérek varázsereje elszállna a rideg betonban! Nézzétek meg újra!" }
        ]
    }
];

let aktualisAllomas = 0;
let tallerek = 0;

function allomasBetoltes() {
    if (aktualisAllomas >= jatekAdatok.length) {
        gyozelemKepernyo();
        return;
    }

    const adat = jatekAdatok[aktualisAllomas];
    let html = `<h2>${adat.title}</h2>`;
    
    if (adat.kepUrl) {
        html += `<img src="${adat.kepUrl}" alt="${adat.title}" class="allomas-kep">`;
    }
    
    html += `<p class="story-text">${adat.story}</p>`;
    
    adat.options.forEach((opt, index) => {
        html += `<button class="option-btn" onclick="valaszEllenorzes(${index})">${opt.text}</button>`;
    });
    
    html += `<div id="feedback-box" class="feedback"></div>`;
    html += `<button id="next-btn" class="option-btn next-btn" onclick="kovetkezoAllomas()">Tovább a következő állomásra ➔</button>`;
    
    document.getElementById('game-content').innerHTML = html;
}

function valaszEllenorzes(optionIndex) {
    if (!zeneSzól) { zeneKapcsolo(); }

    const adat = jatekAdatok[aktualisAllomas];
    const valasztottOpacio = adat.options[optionIndex];
    const fbBox = document.getElementById('feedback-box');
    const nextBtn = document.getElementById('next-btn');
    
    fbBox.style.display = "block";
    
    if (valasztottOpacio.isCorrect) {
        fbBox.className = "feedback success";
        fbBox.innerHTML = valasztottOpacio.feedback;
        penzCsorgas.currentTime = 0;
        penzCsorgas.play();
        tallerek += 10;
        document.getElementById('points').innerText = tallerek;
        nextBtn.style.display = "block";
    } else {
        fbBox.className = "feedback error";
        fbBox.innerHTML = valasztottOpacio.feedback;
        hibaHang.currentTime = 0;
        hibaHang.play();
        nextBtn.style.display = "none";
    }
}

function kovetkezoAllomas() {
    aktualisAllomas++;
    allomasBetoltes();
}

function gyozelemKepernyo() {
    let html = `
        <h2>🏆 KÜLDETÉS SIKERESEN TELJESÍTVE!</h2>
        <p class="story-text">A medál vakító, aranyló fénnyel forr össze a kezetekben. A sötét varázslat elszállt, a <strong>Büdi-tó ősi varázsa megmenekült!</strong> Alfonz büszkén szalad hozzátok. Megcsináltátok!</p>
        <div class="kupon">
            <h3>🎁 A JUTALOM KUPONOTOK</h3>
            <p><strong>A gyerekek vendégek egy finom csokira!</strong></p>
            <p>A felnőtteknek 10% azonnali kedvezmény jár a kávékból! ☕🍫</p>
            <p><em>(Mutassátok fel ezt a képernyőt a Nefelejcs utcai fagyizónál!)</em></p>
        </div>
    `;
    document.getElementById('game-content').innerHTML = html;
}

allomasBetoltes();
</script>

</body>
</html>
