<style>
/* ARANYTALLÉR ANIMÁCIÓ (Legfelülre téve a biztonság kedvéért) */
@keyframes coinExplosion {
    0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.2) rotate(var(--r)); opacity: 0; }
}
.flying-coin {
    position: fixed;
    font-size: 28px;
    pointer-events: none;
    z-index: 9999;
    animation: coinExplosion 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
</style>

<div id="adventure-container" style="
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3)), url('brenner_hatter.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    box-sizing: border-box;
    margin: 0;
    overflow-x: hidden;
">
    <div id="game-ui" style="position: absolute; top: 20px; width: 92%; display: flex; justify-content: space-between; align-items: center; z-index: 10;">
        <div style="display: flex; gap: 10px; align-items: center;">
            <div style="position: relative;">
                <button onclick="toggleInventory()" style="background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); padding: 10px 15px; border-radius: 15px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px;">
                    🎒 Eszköztár ▼
                </button>
                <div id="inventory-dropdown" style="display: none; position: absolute; top: 45px; left: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; width: 200px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100;">
                    <p style="margin: 0 0 8px 0; font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;">Hátizsák tartalma:</p>
                    <div id="inventory-items" style="font-size: 14px; line-height: 1.4;">Táska üres...</div>
                </div>
            </div>
            <div style="background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.15); font-family: monospace; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                ⏱️ <span id="game-timer">00:00</span>
            </div>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <div style="background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 10px 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); font-weight: bold;">
                🪙 <span id="gold-count">0</span> | 🛡️ <span id="medal-count">0</span>/10
            </div>
            <div id="mute-btn" onclick="toggleMusic()" style="cursor:pointer; font-size: 20px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.15);">🔊</div>
        </div>
    </div>

    <div id="adventure-panel" style="
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 40px;
        border-radius: 30px;
        width: 90%;
        max-width: 550px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        z-index: 2;
    ">
        <div id="story-content">
            <h1 style="margin-top: 0; font-size: 32px; letter-spacing: 2px; font-weight: 800;">A BRENNER-REJTÉLY</h1>
            <p style="font-size: 18px; line-height: 1.6; opacity: 0.9;">A legenda szerint a XVIII. kerület szívében lévő titkos oázis mágikus ereje széttört. Járj nyitott szemmel, és segíts nekünk újraegyesíteni az Ősi Medál 10 darabját, hogy a park visszanyerje mágikus erejét!</p>
            
            <button onclick="initAdventure()" style="background: #bef264; color: #1e293b; font-weight: bold; padding: 16px 45px; margin-top: 25px; border: none; border-radius: 14px; cursor: pointer; font-size: 16px; letter-spacing: 1px;">KALAND INDÍTÁSA</button>
        </div>
    </div>

    <div id="custom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 999; align-items: center; justify-content: center;">
        <div style="background: rgba(30, 41, 59, 0.95); border: 2px solid rgba(255,255,255,0.2); padding: 35px; border-radius: 25px; max-width: 420px; width: 85%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
            <div id="modal-icon" style="font-size: 45px; margin-bottom: 15px;"></div>
            <h3 id="modal-title" style="margin-top: 0; font-size: 22px; letter-spacing: 1px;"></h3>
            <p id="modal-text" style="font-size: 16px; line-height: 1.5; opacity: 0.9; margin-bottom: 25px;"></p>
            <button onclick="closeModal()" id="modal-btn" style="background: white; color: black; font-weight: bold; padding: 12px 35px; border: none; border-radius: 12px; cursor: pointer; font-size: 15px; width: 100%;">Rendben</button>
        </div>
    </div>
</div>

<script>
// VÁLTOZÓK ÉS HANGOK
let isMuted = false;
let gold = 0;
let medals = 0;
let currentStep = 0;
let timerInterval;
let totalSeconds = 0;

// Biztonságos audio objektumok (csak akkor indul, ha van fájl)
const bGMusic = new Audio('alapzene.mp3'); bGMusic.loop = true;
const winSnd = new Audio('good_answer.wav');
const loseSnd = new Audio('wrong_answer.wav');
const finalSnd = new Audio('applause.wav');

// FUNKCIÓK
function toggleMusic() {
    isMuted = !isMuted;
    bGMusic.muted = isMuted;
    winSnd.muted = isMuted;
    loseSnd.muted = isMuted;
    finalSnd.muted = isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
}

function startTimer() {
    timerInterval = setInterval(() => {
        totalSeconds++;
        let minutes = Math.floor(totalSeconds / 60);
        let seconds = totalSeconds % 60;
        document.getElementById('game-timer').innerText = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
    }, 1000);
}

function toggleInventory() {
    const dropdown = document.getElementById('inventory-dropdown');
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
}

function spawnCoins(e) {
    let startX = window.innerWidth / 2;
    let startY = window.innerHeight / 2;
    if (e && e.clientX) {
        startX = e.clientX;
        startY = e.clientY;
    }
    for (let i = 0; i < 15; i++) {
        const coin = document.createElement('div');
        coin.className = 'flying-coin';
        coin.innerText = '🪙';
        coin.style.left = startX + 'px';
        coin.style.top = startY + 'px';
        const angle = Math.random() * Math.PI * 2;
        const velocity = 80 + Math.random() * 140;
        const x = Math.cos(angle) * velocity;
        const y = Math.sin(angle) * velocity - 50;
        const r = Math.random() * 720 - 360;
        coin.style.setProperty('--x', `${x}px`);
        coin.style.setProperty('--y', `${y}px`);
        coin.style.setProperty('--r', `${r}deg`);
        document.body.appendChild(coin);
        setTimeout(() => { coin.remove(); }, 1000);
    }
}

let modalCallback = null;
function showModal(title, text, icon, btnText, callback = null) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-text').innerText = text;
    document.getElementById('modal-icon').innerText = icon;
    const btn = document.getElementById('modal-btn');
    btn.innerText = btnText;
    if(icon === "❌") { btn.style.background = "#ef4444"; btn.style.color = "white"; } 
    else if(icon === "✅" || icon === "🎉") { btn.style.background = "#bef264"; btn.style.color = "#1e293b"; } 
    else { btn.style.background = "white"; btn.style.color = "black"; }
    modalCallback = callback;
    document.getElementById('custom-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('custom-modal').style.display = 'none';
    if(modalCallback) { modalCallback(); modalCallback = null; }
}

const storySteps = [
    { story: "A legenda szerint a XVIII. kerületi garázssorok mögött megbúvó oázis egykor egy ipari monstrum árnyékában sínylődött. Az Ősi Medál első darabját csak az kaphatja meg, aki ismeri a múltat. Hogy nevezték a helyiek régen ezt a területet, mielőtt 2018-ban Brenner János nevét felvette volna?", type: "choice", opts: ["Gőzös-tó", "Büdi-tó", "Vas-mocsár"], ans: "Büdi-tó", hint: "Gondolj a kénes, kellemetlen szagokra, ami az akkori mocsaras vízből áradhatott...", success: "Helyes! Megvan az első, halványan izzó szilánk ami most a kezedbe hullik!" },
    { story: "Lépj be a parkba, fordulj el balra és indulj el a sétányon, amíg el nem éred az öreg fák megnyugtató árnyékát! Furcsa, kockás kőasztalok állnak itt, mintha láthatatlan szellemek vívnának csendes csatákat. A medál második darabjához meg kell adnunk a választ. Mi az a szellemi párbaj amit itt szoktak vívni?", type: "text", ans: "sakk", hint: "A hatvannégy kockán vívnak csendes háborút a parasztok, futók, lovak, bástyák védik a királynőt és a királyt.", success: "Sakk-matt! A sakktábla alól előbukkan a második szilánk." },
    { story: "Menj tovább és állj meg ott ahol, a hatalmas fémes kígyók tekeregnek. A harmadik darab megszerzéséhez találd ki a választ. Melyik ipari létesítmény ontotta magából a vizet ebbe a mederbe?", type: "text", ans: "hőerőmű", hint: "A szó első fele a meleggel (hő) kapcsolatos, a második pedig az áramot/energiát termelő üzem (Kispesti...).", success: "Fantasztikus! A csövek halkan felmordulnak, és a rezonancia kilöki a harmadik szilánkot!" },
    { story: "Már három darabja megvan a medálnak! Csak így tovább! Figyelj csak! A levegőben pernye és fafüst kísérteties illata száll. keress egy kőépítményt, ahol padok és ivókút ölelésében, a lángok az éjszakát is nappallá tették. Mi a neve ennek a kiépített építménynek?", type: "text", ans: "tűzrakó", hint: "Itt szoktak nyársra húzott szalonnát sütni a padok között. Egyetlen szó, 't' betűvel kezdődik.", success: "A hamu alól egy vörösen izzó, újabb medálszilánk bukkan elő." },
    { story: "Most vedd utadat a tó sötét, náddal sűrűn benőtt részéhez, ahol védett madarak, gémek és récék fészkelnek. A vízen áthidaló építmény halkan nyikorog a lépteid alatt. Mi az a szerkezet, amin éppen áthaladsz?", type: "choice", opts: ["Kőgát", "Fahíd", "Vas-ösvény"], ans: "Fahíd", hint: "Természetes, ropogós anyagból készült, és a túlpartra visz át.", success: "A deszkák között megcsillan valami... megvan az ötödik szilánk!" },
    { story: "A medál öt darabja már megvan! Haladj tovább, arra ahol a feszültség lábat ereszt, hogy az oázis visszakaphassa mágikus erejét! Keress egy különleges padot, amit a jövő legkisebb védelmezői számára hoztak létre. A park ezen részét a helyi közösség összefogása formálta. Mi található ezen a padon, ami a kisbabás családoknak segít?", type: "choice", opts: ["Etetőszék", "Pelenkázó", "Játékdoboz"], ans: "Pelenkázó", hint: "Ezen a felületen a szülők kényelmesen tisztába tehetik a csecsemőket.", success: "A pad réseiből egy meleg fénnyel világító darab esik a tenyeredbe!" },
    { story: "Állj szembe a pelenkázóval és vedd utadat balra. A távolból vidám csaholást hallod. Egy elkerített területre bukkansz, amit a négylábú társaknak szenteltek. Minek nevezik ezt a kutyáknak fenntartott lezárt zónát?", type: "text", ans: "kutyafuttató", hint: "A kutyák itt tudnak póráz nélkül rohangálni és ismerkedni.", success: "Hihetetlen, előbukkant a föld alól, megvan a hetedik szilánk!" },
    { story: "Amint utadat a magas torony felé veszed, ha balra nézel az ösvény mellett egy öreg őr áll. Törzse nem egyenes, hanem meghajolt az idők viharai alatt, mégis kitartóan kapaszkodik a földbe, vigyázva a park nyugalmára. Nézd meg jól, mit látsz?", type: "choice", opts: ["Ferde fa", "Kettétört fa", "Kiszáradt fa"], ans: "Ferde", hint: "Nem egyenesen áll, hanem megdőlt a föld felszíne felé.", success: "Fantasztikus! A fa kérge alól előkerül a nyolcadik szilánt!" },
    { story: "Fordúlj vissza a kutyafuttató irányába és haladj a pelenkázó felé. Lábaid alatt a talaj hirtelen megváltozik, egy vöröses, rugalmas ösvényre lépsz, ahol a legkitartóbb harcosok edzik a testüket. Ha pontosan egy kört teszel meg ezen a gumiösvényen a tó körül, milyen távolságot hagysz a hátad mögött?", type: "choice", opts: ["400 méter", "500 méter", "800 méter"], ans: "500", hint: "Pontosan egy fél kilométert jelent egy teljes kör.", success: "A cipőd talpa alatt megcsörren a kilencedik szilánk! Az oázis mágikus ereje mindjárt visszatér!" },
    { story: "A küldetésed a végéhez közeledik. A magasban, egy építmény pereménél apró, villás farkú madarak repkednek. A helyiek nem hagyták sorsukra ezeket a hasznos vadászokat. Mi a nevük ezeknek a madaraknak?", type: "text", ans: "fecske", hint: "F betűvel kezdődő madarak, akik sárból fészkelnek, és itt ételt kapnak. Írd be a madár nevét vagy az eszközt (fecske etető)!", success: "Hihetetlen!!! Az etetőből lehullik az utolsó szilánk és a medál hatalmas fénnyel újra egyesül!" }
];

function initAdventure() {
    startTimer();
    renderStep();
    if(!isMuted) {
        try { bGMusic.play().catch(()=>{}); } catch(e){}
    }
}

function showHint() {
    showModal("Segítség a küldetéshez", storySteps[currentStep].hint, "💡", "Értem, folytatom");
}

function renderStep() {
    const step = storySteps[currentStep];
    const panel = document.getElementById('story-content');
    let actionHtml = '';
    
    if(step.type === "choice") {
        step.opts.forEach(o => {
            actionHtml += `<button onclick="checkAnswer('${o}', event)" style="margin: 8px 0; width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: white; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 500;">${o}</button>`;
        });
    } else {
        actionHtml += `
            <input type="text" id="ans-input" placeholder="Válasz ide..." style="padding: 15px; width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4); color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; text-align: center;">
            <button onclick="checkAnswer(document.getElementById('ans-input').value, event)" style="background: #bef264; color: #1e293b; font-weight: bold; padding: 15px 40px; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px;">BEKÜLDÉS</button>
        `;
    }

    actionHtml += `<button onclick="showHint()" style="background: transparent; color: #bef264; border: none; margin-top: 20px; font-size: 14px; cursor: pointer; text-decoration: underline;">💡 Segítség kérése</button>`;

    panel.innerHTML = `
        <h3 style="color: #bef264; margin-top: 0; font-size: 20px;">${currentStep + 1}. Állomás</h3>
        <p style="font-size: 18px; line-height: 1.5; margin-bottom: 25px;">${step.story}</p>
        <div>${actionHtml}</div>
    `;
}

function safePlaySound(snd) {
    if(!isMuted) {
        try { snd.currentTime = 0; snd.play().catch(()=>{}); } catch(e){}
    }
}

function checkAnswer(val, event) {
    const step = storySteps[currentStep];
    if(val.toLowerCase().includes(step.ans.toLowerCase())) {
        spawnCoins(event);
        safePlaySound(winSnd);
        gold += 10; medals++;
        document.getElementById('gold-count').innerText = gold;
        document.getElementById('medal-count').innerText = medals;
        if(medals >= 10) document.getElementById('inventory-items').innerHTML = "🪵<b>Virtuális Farönk</b>";
        
        currentStep++;
        if(currentStep < storySteps.length) {
            showModal("Helyes Válasz!", step.success, "✅", "Következő állomás", renderStep);
        } else {
            clearInterval(timerInterval);
            safePlaySound(finalSnd);
            gold += 50;
            document.getElementById('gold-count').innerText = gold;
            document.getElementById('story-content').innerHTML = `
                <h2 style="color: #bef264;">🏆 KÜLDETÉS SIKERESEN TELJESÍTVE! GRATULÁLUNK!!!</h2>
                <p style="font-size: 18px;">🎖️ Rang: A Brenner-park Hivatalos Védelmezője<br>Játékidőd: <b>${document.getElementById('game-timer').innerText}</b></p>
                <div style="font-size: 60px; margin: 25px 0;">🪵</div>
                <button onclick="location.reload()" style="background: white; color: black; font-weight: bold; padding: 16px 45px; border: none; border-radius: 12px; cursor: pointer;">VISSZA A FŐHUB-BA</button>
            `;
        }
    } else {
        safePlaySound(loseSnd);
        showModal("Helytelen Válasz", "Ez sajnos nem a megfelelő felelet.", "❌", "Újrapróbálom");
    }
}
</script>
